name: Build AutoBridge Mod

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Set up JDK 8
        uses: actions/setup-java@v3
        with:
          java-version: '8'
          distribution: 'temurin'
      - name: Grant execute permission for gradlew
        run: chmod +x gradlew
      - name: Setup Forge workspace
        run: ./gradlew setupDecompWorkspace --no-daemon
        timeout-minutes: 20
      - name: Build jar
        run: ./gradlew build --no-daemon
      - name: Upload jar
        uses: actions/upload-artifact@v3
        with:
          name: AutoBridge-1.0.0
          path: build/libs/AutoBridge-1.0.0.jar
