name: Build AutoBridge Mod

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 8
        uses: actions/setup-java@v4
        with:
          java-version: '8'
          distribution: 'temurin'

      - name: Install Gradle 2.14
        run: |
          wget -q https://services.gradle.org/distributions/gradle-2.14-bin.zip
          unzip -q gradle-2.14-bin.zip -d $HOME
          echo "$HOME/gradle-2.14/bin" >> $GITHUB_PATH

      - name: Generate Gradle wrapper
        run: |
          gradle wrapper --gradle-version=2.14
          chmod +x gradlew

      - name: Setup Forge workspace
        run: ./gradlew setupDecompWorkspace --no-daemon
        timeout-minutes: 25

      - name: Build jar
        run: ./gradlew build --no-daemon

      - name: Upload jar
        uses: actions/upload-artifact@v4
        with:
          name: AutoBridge-1.0.0
          path: build/libs/AutoBridge-1.0.0.jar
